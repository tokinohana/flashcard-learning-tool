<section class="bg-surface-container-low p-10 md:p-14 rounded-lg">
    <div class="mb-12">
        <h2 class="text-xs font-bold text-primary mb-6 uppercase tracking-widest font-headline">{{ type_label|default('Problem Statement') }}</h2>
        <div class="math-text text-3xl md:text-4xl leading-relaxed text-on-surface italic">
            {{ question }}
        </div>
        {% if latex %}
        <div class="mt-10 flex justify-center">
            <div class="math-text text-5xl font-light text-on-surface/90 py-8 px-12 border-l-2 border-primary/20 bg-surface/40">
                {{ latex|safe }}
            </div>
        </div>
        {% endif %}
    </div>

    <!-- Interaction Zone -->
    <div class="max-w-md mx-auto space-y-8">
        <div class="relative group">
            <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter mb-1 font-headline" for="{{ input_id|default('math-answer') }}">{{ input_label|default('Answer') }}</label>
            <input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-4 text-3xl font-headline font-light focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant/30 text-center" id="{{ input_id|default('math-answer') }}" placeholder="{{ placeholder|default('0.00') }}" type="text"/>
            <div id="{{ preview_id|default('math-preview') }}" class="mt-4 text-center text-xl text-primary font-medium min-h-[2rem]"></div>
            {% if unit %}<div class="absolute right-0 bottom-12 text-xs font-medium text-outline-variant/60 font-headline">{{ unit }}</div>{% endif %}
        </div>
        <div class="flex flex-col gap-4">
            <button id="{{ submit_id|default('submit-btn') }}" class="w-full bg-primary hover:bg-primary-dim text-on-primary py-4 px-6 rounded-md font-headline font-semibold text-sm tracking-wide transition-all shadow-sm active:scale-[0.98]">
                {{ submit_label|default('Submit Answer') }}
            </button>
            <div class="flex justify-between items-center px-2">
                <button class="text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1.5 group">
                    <span class="material-symbols-outlined text-sm group-hover:fill-current">lightbulb</span>
                    Show Hint
                </button>
                <button class="text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-sm">flag</span>
                    Report Issue
                </button>
            </div>
        </div>
    </div>
</section>
